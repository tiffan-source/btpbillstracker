<div class="min-h-screen bg-background p-6">
  <div class="mx-auto flex w-full max-w-6xl flex-col gap-8">
    <header class="flex flex-col gap-1">
      <h1 class="text-3xl font-bold text-foreground">Clients &amp; Chantiers</h1>
      <p class="text-sm text-subtle">Vue par client et par chantier</p>
    </header>

    <section class="flex flex-col gap-4 rounded-card border border-subtle bg-surface p-4">
      <h2 class="text-lg font-semibold text-foreground">Par client</h2>
      <div class="flex flex-col gap-4" data-testid="client-list">
        @for (client of facade.clients(); track client.id) {
          <app-client-card
            [client]="{
              id: client.id,
              fullName: client.fullName,
              email: client.email,
              phone: client.phone,
              invoiceCount: client.invoiceCount,
              totalDue: client.totalDue,
              paid: client.paid
            }"
            (edit)="openClientModal($event.id, $event.trigger)"
          />
        } @empty {
          <p class="text-sm text-subtle">Aucun client disponible.</p>
        }
      </div>
    </section>

    <section class="flex flex-col gap-4 rounded-card border border-subtle bg-surface p-4">
      <h2 class="mt-8 text-lg font-semibold text-foreground">Par chantier</h2>
      <p class="text-sm text-subtle">La gestion détaillée des chantiers arrive dans la prochaine étape.</p>
    </section>
  </div>
</div>

<app-client-form-modal
  [isOpen]="isClientModalOpen()"
  [client]="editedClient()"
  [isSubmitting]="facade.isSubmitting()"
  (closed)="closeClientModal()"
  (saved)="saveClient($event)"
/>
