@if (isOpen()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
    (click)="onOverlayClick($event)"
    (keydown.escape)="onEscape()"
    tabindex="-1"
  >
    <div class="w-full max-w-lg rounded-card bg-surface p-6 shadow-lg" role="dialog" aria-modal="true" aria-labelledby="chantier-modal-title">
      <div class="flex items-center justify-between">
        <h3 id="chantier-modal-title" class="text-lg font-semibold text-foreground">Modifier le chantier</h3>
        <button type="button" class="text-subtle hover:text-foreground" (click)="onCancel()" aria-label="Fermer">✕</button>
      </div>

      <form [formGroup]="form()" (ngSubmit)="onSubmit()" class="mt-4 flex flex-col gap-4">
        <div>
          <label for="chantierName" class="mb-1 block text-sm font-medium text-foreground-muted">Nom du chantier</label>
          <input #nameInput id="chantierName" type="text" formControlName="name" class="w-full rounded-input border border-input px-3 py-2 text-sm" />
        </div>

        <div class="mt-6 flex justify-end gap-3">
          <button type="button" class="rounded-btn border border-input bg-surface px-4 py-2 text-sm text-foreground" (click)="onCancel()">Annuler</button>
          <button type="submit" class="rounded-btn bg-primary px-4 py-2 text-sm text-primary-content" [disabled]="isSubmitting()">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>
}
