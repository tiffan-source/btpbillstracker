<article class="rounded-card border border-subtle bg-surface p-4" data-testid="chantier-card">
  <div class="flex items-start justify-between gap-3">
    <div>
      <p class="text-base font-semibold text-foreground">{{ chantier().name }}</p>
      <p class="text-xs text-subtle">Suivi par chantier</p>
    </div>
    <button
      #editTrigger
      type="button"
      class="text-subtle hover:text-foreground"
      (click)="onEdit(editTrigger)"
      [attr.aria-label]="'Editer le chantier ' + chantier().name"
    >
      ✏️
    </button>
  </div>

  <div class="mt-4 flex items-center gap-3">
    <div class="h-2 flex-1 overflow-hidden rounded-full bg-subtle">
      <div class="h-full bg-success" [style.width.%]="chantier().progressPercent"></div>
    </div>
    <span class="text-xs font-semibold text-foreground-muted">{{ chantier().progressPercent }}%</span>
  </div>

  <div class="mt-4 flex items-center justify-between text-sm">
    <p class="font-medium text-success">✓ {{ chantier().paid }} €</p>
    <p [class]="chantier().pending > 0 ? 'font-medium text-warning' : 'font-medium text-subtle'">⏱ {{ chantier().pending }} €</p>
  </div>
</article>
