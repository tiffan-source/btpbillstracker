<article class="flex items-center justify-between rounded-card border border-subtle bg-surface p-4" data-testid="client-card">
  <div class="flex flex-col gap-1">
    <p class="text-base font-semibold text-foreground">{{ client().fullName }}</p>
    <p class="text-xs text-subtle">{{ client().invoiceCount }} factures · {{ client().email }} · {{ client().phone }}</p>
  </div>

  <div class="flex items-center gap-6">
    <div class="text-right">
      <p class="text-xs text-subtle">Total du</p>
      <p [class]="client().totalDue > 0 ? 'text-sm font-semibold text-danger' : 'text-sm font-semibold text-subtle'">
        {{ client().totalDue }} €
      </p>
    </div>

    <div class="text-right">
      <p class="text-xs text-subtle">Paye</p>
      <p class="text-sm font-semibold text-success">{{ client().paid }} €</p>
    </div>

    <button
      #editTrigger
      type="button"
      class="text-subtle hover:text-foreground"
      (click)="onEdit(editTrigger)"
      [attr.aria-label]="'Editer le client ' + client().fullName"
    >
      ✏️
    </button>
  </div>
</article>
